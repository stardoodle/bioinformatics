<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membrane Architect | Bio-World Responsive</title>
    <style>
        @import url('https://googleapis.com');

        :root {
            --yellow: #facc15; --pink: #f472b6; --blue: #38bdf8;
            --green: #4ade80; --orange: #fb923c; --dark: #000000;
            --bg: #fffce8;
        }

        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        
        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg);
            color: var(--dark);
            margin: 0;
            display: flex;
            flex-direction: row;
            height: 100vh;
            overflow: hidden;
        }

        /* Shared Sidebars Style */
        .sidebar {
            width: 320px;
            background: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
            overflow-y: auto;
            flex-shrink: 0;
        }

        .manual { border-right: 4px solid var(--dark); }
        .concept { border-left: 4px solid var(--dark); }

        h2, h3 { 
            font-family: 'Fredoka One', cursive; 
            font-size: 1.5rem; 
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
            margin: 0;
        }

        .step-box {
            background: #f1f5f9;
            border: 3px solid var(--dark);
            padding: 12px;
            border-radius: 18px;
            font-size: 0.85rem;
            line-height: 1.4;
            box-shadow: 4px 4px 0px var(--dark);
            font-weight: 700;
        }

        /* Main Game Area */
        .game-view {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(var(--yellow) 1px, transparent 1px);
            background-size: 30px 30px;
            min-height: 400px;
        }

        .stat-bar {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 50;
        }

        .stat { 
            background: white; 
            padding: 8px 15px; 
            border: 3px solid var(--dark);
            border-radius: 50px; 
            box-shadow: 3px 3px 0px var(--dark);
            font-family: 'Fredoka One', cursive;
            font-size: 0.9rem;
        }

        .zone {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            font-family: 'Fredoka One', cursive;
            font-size: 1.2rem;
            opacity: 0.6;
        }

        .water { background: var(--blue); color: white; }
        .lipid { 
            flex: 1.3; 
            background: var(--yellow); 
            border-top: 5px dashed var(--dark);
            border-bottom: 5px dashed var(--dark);
        }

        .zone.active { opacity: 1; background: white !important; color: var(--dark); }

        /* Draggable Card */
        #node {
            position: absolute;
            width: 100px; height: 100px;
            background: white;
            border: 4px solid var(--dark);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 6px 6px 0px var(--dark);
            z-index: 100;
            cursor: grab;
            touch-action: none;
            left: calc(50% - 50px);
            top: calc(50% - 50px);
        }

        .node-name { font-family: 'Fredoka One', cursive; font-size: 1.5rem; color: var(--pink); }
        .node-prop { font-size: 0.6rem; font-weight: 800; color: #64748b; text-transform: uppercase; }

        /* Mobile Adjustments */
        @media (max-width: 1024px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100%; height: auto; border: none; box-shadow: none; }
            .manual { border-bottom: 4px solid var(--dark); }
            .concept { border-top: 4px solid var(--dark); }
            .game-view { height: 500px; border-bottom: 4px solid var(--dark); }
        }

        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-card { 
            background: white; padding: 30px; border: 5px solid var(--dark);
            border-radius: 30px; text-align: center; width: 90%; max-width: 400px;
            box-shadow: 8px 8px 0px var(--green);
        }
        
        button { 
            font-family: 'Fredoka One', cursive;
            background: var(--pink); color: white; border: 3px solid var(--dark); 
            padding: 12px 30px; border-radius: 15px; cursor: pointer; 
            box-shadow: 4px 4px 0px var(--dark); margin-top: 15px;
        }
    </style>
</head>
<body>

    <!-- LEFT SIDEBAR -->
    <div class="sidebar manual">
        <h2 style="color:var(--orange)">HOW TO PLAY</h2>
        <div class="step-box"><b>Goal:</b> Drag the card into the correct zone.</div>
        <div class="step-box"><b>Water:</b> For <b style="color:var(--blue)">Charged/Polar</b>.</div>
        <div class="step-box"><b>Lipid:</b> For <b style="color:var(--orange)">Hydrophobic</b>.</div>
    </div>

    <!-- GAME CENTER -->
    <div class="game-view" id="game-view">
        <div class="stat-bar">
            <div class="stat">💪 HP: <span id="stab">100</span>%</div>
            <div class="stat">🧬 <span id="prog">1</span>/10</div>
        </div>

        <div class="zone water">CYTOPLASM</div>
        <div class="zone lipid" id="z-lipid">MEMBRANE CORE</div>
        <div class="zone water">CYTOPLASM</div>

        <div id="node">
            <div class="node-name" id="aa-name">---</div>
            <div class="node-prop" id="aa-desc">---</div>
        </div>
    </div>

    <!-- RIGHT SIDEBAR -->
    <div class="sidebar concept">
        <h2 style="color:var(--blue)">THE SCIENCE</h2>
        <div class="step-box" style="background:var(--bg)">
            <b>UNIT IV: Membrane Proteins</b> sit in a fatty lipid bilayer. We use <b>Hydropathy Plots</b> to predict them!
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-card">
            <h1 id="m-title" style="font-family:'Fredoka One'">Result</h1>
            <p id="m-text" style="font-weight:700; color:#475569;"></p>
            <button onclick="location.reload()">PLAY AGAIN ↻</button>
        </div>
    </div>

    <script>
        const aminos = [
            { n: 'LEU', d: 'HYDROPHOBIC', t: 'lipid' },
            { n: 'LYS', d: 'CHARGED (+)', t: 'water' },
            { n: 'VAL', d: 'HYDROPHOBIC', t: 'lipid' },
            { n: 'ARG', d: 'CHARGED (+)', t: 'water' },
            { n: 'PHE', d: 'HYDROPHOBIC', t: 'lipid' },
            { n: 'GLU', d: 'CHARGED (-)', t: 'water' },
            { n: 'ILE', d: 'HYDROPHOBIC', t: 'lipid' },
            { n: 'ASP', d: 'CHARGED (-)', t: 'water' },
            { n: 'TRP', d: 'HYDROPHOBIC', t: 'lipid' },
            { n: 'GLN', d: 'POLAR', t: 'water' }
        ];

        // NEW: SHUFFLE ENGINE
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        let idx = 0, health = 100, dragging = false, startPos = { x: 0, y: 0 };
        const node = document.getElementById('node'), lipidZone = document.getElementById('z-lipid'), scoreEl = document.getElementById('stab'), gameView = document.getElementById('game-view');

        // Start randomized
        shuffle(aminos);
        updateNode();

        const handleStart = (e) => {
            dragging = true;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const rect = node.getBoundingClientRect();
            startPos = { x: cx - rect.left, y: cy - rect.top };
            node.style.transition = 'none';
        };

        const handleMove = (e) => {
            if (!dragging) return;
            if (e.cancelable) e.preventDefault();
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const gRect = gameView.getBoundingClientRect();
            
            node.style.left = `${cx - gRect.left - startPos.x}px`;
            node.style.top = `${cy - gRect.top - startPos.y}px`;

            const lRect = lipidZone.getBoundingClientRect();
            if (cy > lRect.top && cy < lRect.bottom) lipidZone.classList.add('active');
            else lipidZone.classList.remove('active');
        };

        const handleEnd = (e) => {
            if (!dragging) return;
            dragging = false;
            const rect = node.getBoundingClientRect();
            const cy = rect.top + rect.height/2;
            const lRect = lipidZone.getBoundingClientRect();
            validate((cy > lRect.top && cy < lRect.bottom) ? 'lipid' : 'water');
        };

        function validate(choice) {
            if (choice !== aminos[idx].t) { health -= 20; flash('#f87171'); }
            else flash('var(--green)');
            
            scoreEl.innerText = Math.max(0, health);
            node.style.transition = '0.4s cubic-bezier(0.4, 0, 0.2, 1)';
            node.style.transform = 'scale(0)';

            setTimeout(() => {
                idx++;
                if (idx < aminos.length && health > 0) {
                    updateNode();
                    node.style.left = 'calc(50% - 50px)';
                    node.style.top = 'calc(50% - 50px)';
                    node.style.transform = 'scale(1)';
                } else showEnd();
            }, 400);
        }

        function updateNode() {
            document.getElementById('aa-name').innerText = aminos[idx].n;
            document.getElementById('aa-desc').innerText = aminos[idx].d;
            document.getElementById('prog').innerText = idx + 1;
        }

        function flash(c) {
            gameView.style.background = c;
            setTimeout(() => gameView.style.background = '', 150);
        }

        function showEnd() {
            const m = document.getElementById('modal');
            document.getElementById('m-title').innerText = health > 0 ? "SUCCESS! 🎉" : "GAME OVER 😵";
            document.getElementById('m-text').innerText = health > 0 ? "You successfully predicted the membrane sequence!" : "The protein failed to fold correctly.";
            m.style.display = 'flex';
        }

        node.addEventListener('mousedown', handleStart);
        node.addEventListener('touchstart', handleStart, {passive:false});
        window.addEventListener('mousemove', handleMove, {passive:false});
        window.addEventListener('touchmove', handleMove, {passive:false});
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchend', handleEnd);
    </script>
</body>
</html>
